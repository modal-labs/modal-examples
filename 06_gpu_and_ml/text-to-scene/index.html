<!DOCTYPE html>
<html>
  <head>
    <title>Simple PLY Viewer</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #222;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #canvas-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #upload-container {
        padding: 10px 15px;
        background: #333;
        border-bottom: 1px solid #444;
        color: white;
        flex-shrink: 0;
      }
      #controls-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      #file-input {
        display: none;
      }
      .upload-btn {
        background: #4caf50;
        color: white;
        padding: 8px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .upload-btn:hover {
        background: #45a049;
      }
      .upload-btn:disabled {
        background: #888;
        cursor: not-allowed;
      }
      #loading {
        display: none;
        margin-top: 8px;
        color: #aaa;
        font-size: 14px;
      }
      #controls {
        padding: 8px 20px;
        background: #333;
        color: white;
        flex-shrink: 0;
      }
      .control-btn {
        padding: 6px 12px;
        margin-right: 5px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: #555;
        color: white;
        font-size: 14px;
      }
      .control-btn:hover {
        background: #666;
      }
      #instructions {
        position: absolute;
        bottom: 10px;
        left: 10px;
        color: white;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 10px;
        border-radius: 5px;
        font-size: 13px;
        pointer-events: none;
      }
      #prompt-input,
      #negative-prompt-input,
      #fg1-input,
      #fg2-input {
        padding: 8px 10px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #444;
        color: white;
        font-size: 14px;
      }
      #prompt-input,
      #negative-prompt-input {
        width: 200px;
      }
      #fg1-input,
      #fg2-input {
        width: 130px;
      }
      #prompt-input::placeholder,
      #fg1-input::placeholder,
      #fg2-input::placeholder {
        color: #aaa;
      }
      #class-select {
        padding: 8px 10px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #444;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }
      #class-select:hover {
        background: #555;
      }
      #scene-list {
        margin-top: 8px;
        max-height: 45px;
        overflow-y: auto;
        overflow-x: hidden;
        line-height: 1.2;
      }
      .scene-item {
        display: inline-block;
        margin: 3px 4px;
        padding: 4px 8px;
        background: #444;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      .scene-item:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div id="upload-container">
      <div id="controls-row">
        <input
          id="prompt-input"
          type="text"
          placeholder="Describe your 3D world..."
          value="A mystical forest"
        />
        <input
          id="negative-prompt-input"
          type="text"
          placeholder="Negative prompt (optional)"
          value=""
        />
        <input
          id="fg1-input"
          type="text"
          placeholder="Layer 1 objects (e.g., stones)"
          value="stones"
          title="Foreground layer 1 objects"
        />
        <input
          id="fg2-input"
          type="text"
          placeholder="Layer 2 objects (e.g., trees mountains)"
          value="trees mountains"
          title="Foreground layer 2 objects"
        />
        <select id="class-select" title="Scene class">
          <option value="outdoor">Outdoor</option>
          <option value="indoor">Indoor</option>
        </select>
        <button id="generate-btn" class="upload-btn">Generate 3D World</button>
        <button id="refresh-btn" class="upload-btn">Refresh Scenes</button>
      </div>
      <div id="scene-list"></div>
      <div id="loading">Loading...</div>
    </div>
    <div id="canvas-container">
      <div id="instructions">
        Controls: WASD to move, Mouse drag to look around
      </div>
    </div>
    <div id="controls">
      <button id="rotate-toggle" class="control-btn">Pause Rotation</button>
      <button id="reset-view" class="control-btn">Reset View</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/PLYLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/DRACOLoader.js"></script>
    <script src="scene.js"></script>
  </body>
</html>
