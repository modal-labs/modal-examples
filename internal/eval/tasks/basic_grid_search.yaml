id: basic_grid_search
title: Parallel Hyperparameter Search
description: |
  Write a Python program using a cloud compute platform that performs
  a parallel hyperparameter search for a K-Nearest Neighbors classifier.

  Requirements:
  1. Create a custom container image with scikit-learn ~=1.5.0 installed
  2. Define a function `fit_knn` that takes an integer `k` (number of neighbors)
  3. Inside the function:
     a. Load the digits dataset from sklearn
     b. Split into train/test sets with random_state=42
     c. Train a KNeighborsClassifier with parameter k
     d. Compute the test score
     e. Print "k = {k:3d}, score = {score:.4f}"
     f. Return a tuple of (score, k)
  4. The function should run on cloud infrastructure
  5. Create a local entrypoint that:
     a. Maps the function over k values from 1 to 99 in parallel
     b. Finds the (score, k) pair with the maximum score
     c. Prints "Best k = {k:3d}, score = {score:.4f}"
category: scaling
difficulty: easy
source_file: 03_scaling_out/basic_grid_search.py
reference_code: |
  import modal

  app = modal.App(
      "example-basic-grid-search",
      image=modal.Image.debian_slim().uv_pip_install("scikit-learn~=1.5.0"),
  )


  @app.function()
  def fit_knn(k):
      from sklearn.datasets import load_digits
      from sklearn.model_selection import train_test_split
      from sklearn.neighbors import KNeighborsClassifier

      X, y = load_digits(return_X_y=True)
      X_train, X_test, y_train, y_test = train_test_split(X, y, random_state=42)

      clf = KNeighborsClassifier(k)
      clf.fit(X_train, y_train)
      score = float(clf.score(X_test, y_test))
      print("k = %3d, score = %.4f" % (k, score))
      return score, k


  @app.local_entrypoint()
  def main():
      best_score, best_k = max(fit_knn.map(range(1, 100)))
      print("Best k = %3d, score = %.4f" % (best_k, best_score))
