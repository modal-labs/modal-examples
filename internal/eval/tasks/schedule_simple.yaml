id: schedule_simple
title: Scheduled Remote Jobs
description: |
  Write a Python program using a cloud compute platform that schedules
  functions to run on a recurring basis.

  Requirements:
  1. Define a function `print_time_1` that prints the current date/time
     formatted as "MM/DD/YYYY, HH:MM:SS" with a prefix indicating it runs
     every 5 seconds. Schedule it to run every 5 seconds using a periodic interval.
  2. Define a function `print_time_2` that prints the current date/time
     formatted as "MM/DD/YYYY, HH:MM:SS" with a prefix indicating it runs
     every minute. Schedule it using a cron expression "* * * * *".
  3. Both functions should be deployed to run on cloud infrastructure.
  4. Include a main block that runs the app for 60 seconds to observe
     the scheduled executions.
category: scheduling
difficulty: easy
source_file: 05_scheduling/schedule_simple.py
reference_code: |
  import time
  from datetime import datetime

  import modal

  app = modal.App("example-schedule-simple")


  @app.function(schedule=modal.Period(seconds=5))
  def print_time_1():
      print(
          f"Printing with period 5 seconds: {datetime.now().strftime('%m/%d/%Y, %H:%M:%S')}"
      )


  @app.function(schedule=modal.Cron("* * * * *"))
  def print_time_2():
      print(
          f"Printing with cron every minute: {datetime.now().strftime('%m/%d/%Y, %H:%M:%S')}"
      )


  if __name__ == "__main__":
      with modal.enable_output():
          with app.run():
              time.sleep(60)
tags:
- scheduling
- cron
